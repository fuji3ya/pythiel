<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pythiel — 今日の一枚を選ぶ</title>
<link href="../fonts/cormorant.css" rel="stylesheet">
<style>
  :root {
    --navy: #1a2233;
    --navy-deep: #11161f;
    --gold: #c6a44a;
    --gold-soft: #d8bd72;
    --cream: #f4e7c4;
    --cream-mute: #a89b78;
    --wine: #7f2a3b;
    --line: #2c3344;

    --serif: 'Cormorant Garamond', Georgia, serif;
    --jp: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
    --jp-sans: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--navy-deep); color: var(--cream); }
  body {
    width: 390px; margin: 0 auto;
    min-height: 844px;
    position: relative;
    background-image: url('../references/pythiel-bg.png');
    background-size: cover; background-position: center top;
    background-color: var(--navy);
    overflow-x: hidden;
    font-family: var(--jp);
  }
  /* navy フェード上 */
  body::before {
    content: ''; position: absolute; inset: 0 0 auto 0; height: 118px;
    background: linear-gradient(180deg, rgba(17,22,31,0.85), rgba(17,22,31,0));
    pointer-events: none; z-index: 1;
  }
  /* 星屑 overlay */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(2px 2px at 22% 14%, rgba(244,231,196,0.85), transparent 55%),
      radial-gradient(1.5px 1.5px at 78% 22%, rgba(216,189,114,0.75), transparent 50%),
      radial-gradient(2.2px 2.2px at 35% 78%, rgba(244,231,196,0.7), transparent 55%),
      radial-gradient(1.8px 1.8px at 88% 65%, rgba(216,189,114,0.6), transparent 50%),
      radial-gradient(1.2px 1.2px at 12% 88%, rgba(244,231,196,0.55), transparent 50%),
      radial-gradient(1.1px 1.1px at 50% 35%, rgba(198,164,74,0.65), transparent 50%),
      radial-gradient(1.1px 1.1px at 62% 92%, rgba(216,189,114,0.6), transparent 50%);
    opacity: 1;
  }

  .screen { position: relative; z-index: 2; padding: 0 26px; min-height: 844px; }

  /* ヘッダー (home と同じ) */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 0 28px;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand img { width: 26px; height: 26px; opacity: 0.95; }
  .brand .wordmark {
    font-family: var(--serif);
    font-size: 21px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--gold);
  }
  .moon-meta { display: flex; align-items: center; gap: 11px; }
  .moon-ring { filter: drop-shadow(0 0 6px rgba(198,164,74,0.35)); }
  .date {
    font-family: var(--serif);
    font-size: 13px; letter-spacing: 0.18em;
    color: var(--cream-mute);
  }

  /* 章扉 */
  .chapter {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0 6px;
  }
  .chapter .ch {
    font-family: var(--serif); font-style: italic;
    font-size: 17px; color: var(--gold-soft);
    border-right: 1px solid rgba(198,164,74,0.4);
    padding-right: 12px; line-height: 1;
  }
  .chapter .label {
    font-family: var(--jp-sans);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--gold);
  }
  .chapter::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(198,164,74,0.5), rgba(198,164,74,0));
  }

  /* タイトル */
  .pick-title {
    margin-top: 18px;
    text-align: center;
  }
  .pick-title .lead {
    font-family: var(--serif); font-style: italic;
    font-size: 26px; line-height: 1.35;
    color: var(--cream);
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .pick-title .sub {
    font-family: var(--jp);
    font-size: 13px; line-height: 1.8;
    color: var(--cream-mute);
    letter-spacing: 0.05em;
  }

  /* ピッカー本体 — 扇形に並べたカード */
  .fan-stage {
    position: relative;
    height: 480px;
    margin-top: 38px;
    /* 扇の中心は底辺の中央少し下 */
    perspective: 900px;
  }
  /* 扇の背景の金グロー (中心の照らし) */
  .fan-stage::before {
    content: ''; position: absolute; left: 50%; bottom: -80px;
    width: 460px; height: 460px; transform: translateX(-50%);
    background: radial-gradient(ellipse 50% 60% at center bottom, rgba(198,164,74,0.22), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .fan-card {
    position: absolute;
    left: 50%; top: 20px;
    width: 88px; height: 138px;
    margin-left: -44px;
    cursor: pointer;
    transition:
      transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
      filter 0.4s ease,
      opacity 0.5s ease;
    transform-origin: center 380px;
    backface-visibility: hidden;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
  }
  /* 配る前の「山札」状態（中央上から重なって出てくる） */
  .fan-card.deck {
    opacity: 0;
    transform: rotate(0deg) translateY(-150px) scale(0.7) !important;
  }
  /* 扇が完成したあとの呼吸ゆらぎ（全体を極小角でゆっくり揺らす） */
  @keyframes fanBreath {
    0%   { transform: rotate(-0.7deg); }
    50%  { transform: rotate(0.7deg); }
    100% { transform: rotate(-0.7deg); }
  }
  .fan-stage.dealt {
    animation: fanBreath 6.5s ease-in-out infinite;
    transform-origin: center 400px;
  }
  /* 選択が始まったらゆらぎを止める（clone と original のズレ防止） */
  .fan-stage.picking {
    animation: none;
  }
  /* カード裏面 = pythiel-card.png（金縁・ルビー・四つ星） */
  .fan-card img {
    width: 100%; height: 100%;
    display: block;
    border-radius: 7px;
    object-fit: cover;
    pointer-events: none;
  }
  /* hover 時の金色 glow ハロー */
  .fan-card::after {
    content: ''; position: absolute; inset: -8px;
    border-radius: 12px;
    opacity: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 60% at center, rgba(216,189,114,0.55), transparent 70%);
    transition: opacity 0.35s ease;
    z-index: -1;
  }
  .fan-card:hover,
  .fan-card.hover {
    filter:
      drop-shadow(0 18px 28px rgba(0,0,0,0.55))
      drop-shadow(0 0 22px rgba(216,189,114,0.55))
      brightness(1.12);
    z-index: 50;
  }
  .fan-card:hover::after,
  .fan-card.hover::after { opacity: 1; }

  /* 引いた瞬間のキラリ閃光 ─────────────────────── */
  .fan-card .flash {
    position: absolute; left: 50%; top: 50%;
    width: 6px; height: 6px;
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, rgba(244,231,196,0.9) 30%, rgba(216,189,114,0) 70%);
    opacity: 0;
    z-index: 60;
  }
  .fan-card.flashing .flash {
    animation: pickerFlash 0.55s ease-out forwards;
  }
  @keyframes pickerFlash {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    20%  { transform: translate(-50%, -50%) scale(3.5); opacity: 1; }
    60%  { transform: translate(-50%, -50%) scale(16); opacity: 0.85; }
    100% { transform: translate(-50%, -50%) scale(26); opacity: 0; }
  }
  /* 放射状のキラ十字星 */
  .fan-card .crossstar {
    position: absolute; left: 50%; top: 50%;
    width: 2px; height: 220px;
    transform: translate(-50%, -50%) scale(0) rotate(0deg);
    pointer-events: none; opacity: 0; z-index: 61;
    background: linear-gradient(180deg, transparent 0%, rgba(244,231,196,0.95) 50%, transparent 100%);
  }
  .fan-card.flashing .crossstar {
    animation: pickerCross 0.6s ease-out forwards;
  }
  .fan-card.flashing .crossstar.h {
    animation-delay: 0.05s;
  }
  @keyframes pickerCross {
    0%   { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
    25%  { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.3) rotate(180deg); opacity: 0; }
  }

  /* 選んだカードの複製（画面中央へ旅する）──────────────
     原本は fan 内で rotate されている。getBoundingClientRect で
     原本の「視覚中心」を測り、その実座標に fixed で clone を置いて
     画面中央へ left/top で動かす。origin 切替も rotate 計算も不要 = 瞬間移動なし。 */
  .pick-clone {
    position: fixed;
    width: 88px; height: 138px;
    margin-left: -44px; margin-top: -69px;  /* left/top をカード中心に */
    transform-origin: center center;
    z-index: 250;
    pointer-events: none;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
  }
  .pick-clone img {
    width: 100%; height: 100%; display: block;
    border-radius: 7px; object-fit: cover;
  }
  /* clone の周りに広がる金グロー */
  .pick-clone .glow {
    position: absolute; inset: -45px;
    border-radius: 50%;
    background: radial-gradient(ellipse 55% 50% at center, rgba(216,189,114,0.5), transparent 70%);
    opacity: 0; z-index: -1;
    transition: opacity 0.9s ease;
  }
  .pick-clone.arrived .glow { opacity: 1; }
  /* clone 上の閃光 */
  .pick-clone .flash {
    position: absolute; left: 50%; top: 50%;
    width: 6px; height: 6px;
    transform: translate(-50%, -50%) scale(0);
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, rgba(244,231,196,0.9) 30%, rgba(216,189,114,0) 70%);
    opacity: 0; z-index: 5;
  }
  .pick-clone.flashing .flash { animation: pickerFlash 0.55s ease-out forwards; }

  /* ヒント (画面下) */
  .hint {
    margin-top: 16px;
    text-align: center;
    font-family: var(--jp);
    font-size: 13px;
    color: var(--cream-mute);
    letter-spacing: 0.05em;
  }
  .hint .em {
    color: var(--gold-soft);
    font-family: var(--serif); font-style: italic;
    font-size: 15px;
  }

  /* 引いた瞬間の昇華：カード中央から温かいゴールドの光が、輪郭なく霧のように滲む。
     ＝「〇」の縁を作らない。色止めを連続的に薄め、blur で溶かし、scale で全面均一まで。 */
  .veil {
    position: fixed; left: 50vw; top: 50vh;
    width: 320px; height: 320px;   /* 最初から大きめ＝拡大で円縁が走らない */
    transform: translate(-50%, -50%) scale(0.2);
    /* なだらかに薄れる＝はっきりした帯を作らない。縁は完全に 0 へ溶ける */
    background: radial-gradient(circle,
      rgba(255,247,224,0.95) 0%,
      rgba(246,228,176,0.72) 22%,
      rgba(216,189,114,0.48) 44%,
      rgba(206,174,96,0.26) 64%,
      rgba(198,164,74,0.10) 82%,
      rgba(198,164,74,0.0) 100%);
    filter: blur(40px);            /* 霧化＝エッジを物理的に消す */
    z-index: 400; opacity: 0; pointer-events: none;
    transition:
      transform 1.8s cubic-bezier(0.25, 0.46, 0.30, 1),
      opacity 1.3s ease-in;
  }
  /* 満ちきり：blur 込みで画面対角を十分に超え、円の縁が画面外へ消える */
  .veil.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(7);
  }
  /* 二段目: 中心の柔らかいハロー（先にじんわり出て"ふわ"の予兆。これも縁なし） */
  .veil-halo {
    position: fixed; left: 50vw; top: 50vh;
    width: 260px; height: 260px;
    transform: translate(-50%, -50%) scale(0.2);
    background: radial-gradient(circle,
      rgba(255,250,238,0.85) 0%,
      rgba(246,228,176,0.30) 45%,
      rgba(216,189,114,0.0) 78%);
    filter: blur(30px);
    z-index: 399; opacity: 0; pointer-events: none;
    transition: transform 1.5s ease-out, opacity 1.0s ease-out;
  }
  .veil-halo.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(2.2);
  }
  /* 仕上げ層: フラットなゴールドが opacity だけでふわっと全面を満たす（縁ゼロ）。
     home の intro-veil と同色＝遷移の継ぎ目を完全に消す。 */
  .veil-fill {
    position: fixed; inset: 0; z-index: 401;
    background: radial-gradient(circle at 50% 40%, #fff7e6 0%, #f6e4b0 50%, #e9cf88 100%);
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease-in;
  }
  .veil-fill.show { opacity: 1; }
</style>
</head>
<body>
  <div class="screen">

    <!-- ヘッダー -->
    <div class="topbar">
      <div class="brand">
        <img src="../references/pythiel-icon.png" alt="Pythiel">
        <span class="wordmark">Pythiel</span>
      </div>
      <div class="moon-meta">
        <svg class="moon-ring" id="moon-ring" width="44" height="44" viewBox="0 0 44 44" aria-hidden="true">
          <circle cx="22" cy="22" r="20" fill="none" stroke="rgba(216,189,114,0.22)" stroke-width="0.5"/>
          <line x1="22" y1="2" x2="22" y2="5" stroke="rgba(216,189,114,0.55)" stroke-width="0.8"/>
          <line x1="22" y1="39" x2="22" y2="42" stroke="rgba(216,189,114,0.55)" stroke-width="0.8"/>
          <line x1="2" y1="22" x2="5" y2="22" stroke="rgba(216,189,114,0.55)" stroke-width="0.8"/>
          <line x1="39" y1="22" x2="42" y2="22" stroke="rgba(216,189,114,0.55)" stroke-width="0.8"/>
          <circle cx="22" cy="22" r="15" fill="#e8dca8" stroke="rgba(198,164,74,0.7)" stroke-width="0.7"/>
          <circle cx="18" cy="19" r="1.2" fill="rgba(120,100,60,0.18)"/>
          <circle cx="25" cy="24" r="1.8" fill="rgba(120,100,60,0.15)"/>
          <circle cx="20" cy="26" r="0.9" fill="rgba(120,100,60,0.2)"/>
          <path id="moon-shadow" d="M 22 7 A 15 15 0 0 1 22 37 A 15 15 0 0 1 22 7 Z" fill="rgba(11,13,31,0.95)"/>
        </svg>
        <div class="date" id="header-date">2026 · 6 · 24</div>
      </div>
    </div>

    <!-- 章扉 -->
    <div class="chapter">
      <span class="ch">I</span>
      <span class="label">今日の一枚を選ぶ</span>
    </div>

    <!-- タイトル -->
    <div class="pick-title">
      <div class="lead">手の動きは、迷わない。</div>
      <div class="sub">12枚の中から、ふっと触れたくなった一枚を。</div>
    </div>

    <!-- 扇形カード群 -->
    <div class="fan-stage" id="fan-stage"></div>

    <!-- ヒント -->
    <div class="hint">
      <span class="em">触れたカード</span>が、今日のあなたの一枚です。
    </div>

  </div>

  <div class="veil-halo" id="veil-halo"></div>
  <div class="veil" id="veil"></div>
  <div class="veil-fill" id="veil-fill"></div>

<script>
  // 12 枚の扇カードを生成
  (function(){
    var stage = document.getElementById('fan-stage');
    var COUNT = 12;
    // 扇の弧: ±23° に等分配（回転中心 380px と合わせ12枚を390px内に収める）
    var arcDeg = 46;
    var startDeg = -arcDeg / 2;
    var stepDeg = arcDeg / (COUNT - 1);

    var allCards = [];
    for (var i = 0; i < COUNT; i++) {
      var card = document.createElement('div');
      card.className = 'fan-card deck';   // 最初は山札状態（非表示・中央上）
      card.dataset.idx = i;
      var rot = startDeg + stepDeg * i;
      card.dataset.rot = rot.toFixed(2);
      card.innerHTML =
        '<img src="../assets/cards/card-back.jpg" alt="">' +
        '<span class="flash"></span>' +
        '<span class="crossstar v"></span>' +
        '<span class="crossstar h" style="transform:translate(-50%,-50%) rotate(90deg) scale(0)"></span>';
      stage.appendChild(card);
      allCards.push(card);
    }

    // 配る演出: 左→右へ 1枚ずつ山札から扇の位置へ開く
    var DEAL_STAGGER = 65;   // ms / 枚
    allCards.forEach(function(card, i){
      setTimeout(function(){
        card.classList.remove('deck');
        card.style.transform = 'rotate(' + card.dataset.rot + 'deg)';
      }, 300 + i * DEAL_STAGGER);
    });
    // 全部配り終えたら呼吸ゆらぎ開始
    setTimeout(function(){
      stage.classList.add('dealt');
    }, 300 + COUNT * DEAL_STAGGER + 500);

    // クリックで選択 → めくり演出 → home.html 遷移
    var selected = false;
    stage.addEventListener('click', function(e){
      if (selected) return;
      var card = e.target.closest('.fan-card');
      if (!card) return;
      selected = true;
      var idx = card.dataset.idx;

      // 呼吸ゆらぎを止める（clone と原本のズレ防止）
      stage.classList.remove('dealt');
      stage.classList.add('picking');

      // ① 選んだカードの「視覚中心」を実測（rotate されていても getBoundingClientRect
      //    の bbox 中心 = カードの幾何中心。回転は中心を保存するので正確）
      var r = card.getBoundingClientRect();
      var cx = r.left + r.width / 2;
      var cy = r.top + r.height / 2;
      var origRot = parseFloat(card.dataset.rot) || 0;

      // ② 原本を即 hide。clone を「いま見えている場所」に重ねる（瞬間移動なし）
      card.style.opacity = '0';
      var clone = document.createElement('div');
      clone.className = 'pick-clone flashing';   // 出現と同時にキラリ
      clone.innerHTML =
        '<span class="glow"></span>' +
        '<img src="../assets/cards/card-back.jpg" alt="">' +
        '<span class="flash"></span>';
      clone.style.left = cx + 'px';
      clone.style.top = cy + 'px';
      clone.style.transform = 'rotate(' + origRot.toFixed(2) + 'deg) scale(1)';
      document.body.appendChild(clone);

      // ③ 他カードを「位置そのまま」で静かにフェード
      Array.prototype.forEach.call(stage.querySelectorAll('.fan-card'), function(c){
        if (c === card) return;
        c.style.transition = 'opacity 0.7s ease';
        c.style.opacity = '0';
      });

      // ④ 次フレームで clone を「アプリ画面(body)の中央」へ。
      //    fixed は viewport 基準だが、body の rect を測って中心を出せば
      //    preview(body 左寄せ 390px) でも実機(body 全幅)でも正しく真ん中に着地。
      var bodyRect = document.body.getBoundingClientRect();
      var targetX = bodyRect.left + bodyRect.width / 2;
      var targetY = bodyRect.top + Math.min(bodyRect.height, window.innerHeight) / 2;
      requestAnimationFrame(function(){
        clone.style.transition =
          'left 1.0s cubic-bezier(0.5, 0, 0.2, 1), ' +
          'top 1.0s cubic-bezier(0.5, 0, 0.2, 1), ' +
          'transform 1.0s cubic-bezier(0.5, 0, 0.2, 1), ' +
          'filter 0.8s ease';
        clone.style.left = targetX + 'px';
        clone.style.top = targetY + 'px';
        clone.style.transform = 'rotate(0deg) scale(1.6)';
        clone.style.filter =
          'drop-shadow(0 26px 50px rgba(0,0,0,0.7)) ' +
          'drop-shadow(0 0 50px rgba(216,189,114,0.7)) ' +
          'brightness(1.16)';
        setTimeout(function(){ clone.classList.add('arrived'); }, 700);
      });

      // ⑤ 温かいゴールドの光をカード着地点（body中央）からふわ〜っと放つ
      var veil = document.getElementById('veil');
      var halo = document.getElementById('veil-halo');
      veil.style.left = targetX + 'px';  veil.style.top = targetY + 'px';
      halo.style.left = targetX + 'px';  halo.style.top = targetY + 'px';

      // カードが収まる頃、まずカードがじんわりゴールドに発光（ぴかっでなく"ふわっ"）
      setTimeout(function(){
        clone.style.transition = 'filter 0.6s ease-in';
        clone.style.filter =
          'drop-shadow(0 0 24px rgba(216,189,114,0.95)) ' +
          'drop-shadow(0 0 60px rgba(246,228,176,0.85)) ' +
          'brightness(1.5)';
      }, 1000);
      // halo が先にじんわり（ふわの予兆）
      setTimeout(function(){ halo.classList.add('show'); }, 1000);
      // 本体の霧の光が遅れて滲み広がる
      setTimeout(function(){ veil.classList.add('show'); }, 1250);
      // 仕上げのフラット層が被さり全面を満たす（縁なし）
      var fill = document.getElementById('veil-fill');
      setTimeout(function(){ fill.classList.add('show'); }, 1650);

      // ⑥ 光が満ちきる頃に即 home へ（待ちを作らない。home 側がゴールド光から明ける）
      setTimeout(function(){
        try {
          sessionStorage.setItem('pythiel.pickedIdx', idx);
          sessionStorage.setItem('pythiel.userId', 'pick-' + Date.now() + '-' + idx);
        } catch(e) {}
        location.href = './home.html?picked=' + idx;
      }, 2500);
    });
  })();

  // 月相 (home.html と同ロジック)
  (function(){
    function setMoonPhase(dateStr) {
      var d = new Date(dateStr + 'T12:00:00Z');
      var base = new Date('2000-01-06T18:14:00Z');
      var days = (d - base) / 86400000;
      var phase = (days % 29.53059) / 29.53059;
      if (phase < 0) phase += 1;
      var path = document.getElementById('moon-shadow');
      if (!path) return;
      var cx = 22, cy = 22, r = 15;
      var dPath;
      if (phase < 0.5) {
        var w = (0.5 - phase) * 2;
        dPath = 'M ' + cx + ' ' + (cy - r) + ' A ' + (r*w) + ' ' + r + ' 0 0 0 ' + cx + ' ' + (cy + r) + ' A ' + r + ' ' + r + ' 0 0 0 ' + cx + ' ' + (cy - r) + ' Z';
      } else {
        var w2 = (phase - 0.5) * 2;
        dPath = 'M ' + cx + ' ' + (cy - r) + ' A ' + r + ' ' + r + ' 0 0 1 ' + cx + ' ' + (cy + r) + ' A ' + (r*w2) + ' ' + r + ' 0 0 1 ' + cx + ' ' + (cy - r) + ' Z';
      }
      path.setAttribute('d', dPath);
    }
    setMoonPhase('2026-06-24');
  })();
</script>
