<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pythiel — 二人の縁</title>
<link href="../fonts/cormorant.css" rel="stylesheet">
<style>
  :root {
    --navy: #1a2233;
    --navy-deep: #11161f;
    --gold: #c6a44a;
    --gold-soft: #d8bd72;
    --cream: #f4e7c4;
    --cream-mute: #a89b78;
    --wine: #7f2a3b;
    --line: #2c3344;

    --serif: 'Cormorant Garamond', Georgia, serif;
    --jp: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
    --jp-sans: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--navy-deep); color: var(--cream); }
  body {
    width: 390px; margin: 0 auto;
    min-height: 844px;
    position: relative;
    background-image: url('../references/pythiel-bg.png');
    background-size: cover; background-position: center top;
    background-color: var(--navy);
    overflow-x: hidden;
    font-family: var(--jp);
  }
  body::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 130px;
    background: linear-gradient(180deg, rgba(17,22,31,0.88), rgba(17,22,31,0));
    pointer-events: none; z-index: 1;
  }
  body::after {
    content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(2px 2px at 22% 14%, rgba(244,231,196,0.85), transparent 55%),
      radial-gradient(1.5px 1.5px at 78% 22%, rgba(216,189,114,0.75), transparent 50%),
      radial-gradient(2.2px 2.2px at 35% 78%, rgba(244,231,196,0.7), transparent 55%),
      radial-gradient(1.8px 1.8px at 88% 65%, rgba(216,189,114,0.6), transparent 50%),
      radial-gradient(1.2px 1.2px at 12% 88%, rgba(244,231,196,0.55), transparent 50%),
      radial-gradient(1.1px 1.1px at 50% 35%, rgba(198,164,74,0.65), transparent 50%),
      radial-gradient(1.1px 1.1px at 62% 92%, rgba(216,189,114,0.6), transparent 50%),
      radial-gradient(1.2px 1.2px at 8% 48%, rgba(216,189,114,0.55), transparent 50%),
      radial-gradient(1.3px 1.3px at 92% 38%, rgba(244,231,196,0.5), transparent 50%);
    opacity: 1;
  }

  .screen { position: relative; z-index: 2; padding: 0 30px 40px; display: flex; flex-direction: column; min-height: 844px; }

  /* topbar（他画面と同一） */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px 0 8px; }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand img { width: 26px; height: 26px; opacity: 0.95; }
  .brand .wordmark { font-family: var(--serif); font-size: 21px; font-weight: 600; letter-spacing: 0.08em; color: var(--gold); }
  .date { font-family: var(--serif); font-size: 13px; letter-spacing: 0.18em; color: var(--cream-mute); }

  /* eyebrow（章 + PRO バッジ） */
  .eyebrow { display: flex; align-items: center; gap: 12px; margin-top: 26px; }
  .eyebrow .ch {
    font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--gold-soft);
    border-right: 1px solid rgba(198,164,74,0.4); padding-right: 12px; line-height: 1;
  }
  .eyebrow .label {
    font-family: var(--jp-sans); font-size: 12px; font-weight: 700;
    letter-spacing: 0.42em; text-transform: uppercase; color: var(--gold);
  }
  .eyebrow .pro-badge {
    font-family: var(--serif); font-size: 12px; font-weight: 600;
    letter-spacing: 0.2em; color: var(--navy);
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    padding: 4px 12px; border-radius: 5px;
    box-shadow: 0 2px 8px rgba(198,164,74,0.35);
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(198,164,74,0.5), rgba(198,164,74,0)); }

  .headline {
    font-family: var(--jp); font-size: 25px; font-weight: 500; line-height: 1.5;
    color: var(--cream); margin-top: 20px; letter-spacing: 0.01em;
  }
  .headline .em { color: var(--gold-soft); }
  .subline { font-family: var(--jp); font-size: 13.5px; line-height: 1.9; color: var(--cream-mute); margin-top: 12px; }

  /* ── 生まれた刻（onboarding と同一言語） ───────── */
  .birth-block { margin-top: 26px; }
  .date-row { display: flex; align-items: flex-end; gap: 14px; margin-bottom: 8px; }
  .date-field { flex: 1; text-align: center; }
  .date-field.year { flex: 1.5; }
  .date-field input {
    width: 100%; background: none; border: none;
    border-bottom: 1px solid rgba(198,164,74,0.4);
    color: var(--cream); text-align: center;
    font-family: var(--serif); font-size: 34px; font-weight: 500;
    padding: 4px 0 8px;
    outline: none; letter-spacing: 0.04em;
  }
  .date-field input::placeholder { color: rgba(168,155,120,0.45); }
  .date-field input:focus { border-bottom-color: var(--gold); }
  .date-field .unit {
    font-family: var(--jp-sans); font-size: 10px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--cream-mute);
    margin-top: 8px;
  }
  .optional-field { margin-top: 26px; }
  .optional-field .lbl {
    display: flex; align-items: baseline; gap: 8px;
    font-family: var(--jp); font-size: 14px; color: var(--cream);
    margin-bottom: 8px;
  }
  .optional-field .lbl .tag {
    font-family: var(--jp-sans); font-size: 10px; letter-spacing: 0.12em;
    color: var(--gold-soft); border: 1px solid rgba(198,164,74,0.35);
    border-radius: 4px; padding: 1px 7px;
  }
  .optional-field .hint {
    font-family: var(--jp-sans); font-size: 11px; color: var(--cream-mute);
  }
  .text-input {
    width: 100%; background: rgba(17,22,31,0.6);
    border: 1px solid var(--line); border-radius: 12px;
    color: var(--cream); font-family: var(--serif); font-size: 22px;
    padding: 12px 16px; outline: none; letter-spacing: 0.05em;
  }
  .text-input::placeholder { color: rgba(168,155,120,0.4); font-size: 18px; }
  .text-input:focus { border-color: rgba(198,164,74,0.6); }

  .privacy-note {
    display: flex; gap: 9px; align-items: flex-start;
    margin-top: 22px;
    font-family: var(--jp-sans); font-size: 11px; line-height: 1.6; color: var(--cream-mute);
  }
  .privacy-note svg { width: 14px; height: 14px; flex: none; margin-top: 2px; stroke: var(--gold-soft); fill: none; stroke-width: 1.3; }

  /* CTA（金のボタン。onboarding と同一） */
  .cta {
    margin-top: 28px;
    display: block; width: 100%;
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    color: var(--navy-deep);
    font-family: var(--jp); font-weight: 700; font-size: 16px;
    letter-spacing: 0.08em;
    border: none; border-radius: 14px;
    padding: 17px; cursor: pointer;
    box-shadow: 0 10px 26px rgba(198,164,74,0.28), inset 0 1px 0 rgba(255,247,224,0.5);
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 16px 34px rgba(198,164,74,0.4), inset 0 1px 0 rgba(255,247,224,0.5); }
  .cta:disabled { opacity: 0.32; cursor: default; box-shadow: none; transform: none; }
  .cta .arrow { font-family: var(--serif); }
  .ghost-cta {
    display: block; text-align: center; margin-top: 16px;
    font-family: var(--jp-sans); font-size: 12px; letter-spacing: 0.06em;
    color: var(--cream-mute); cursor: pointer; background: none; border: none; width: 100%;
  }

  /* ── 結果画面 ─────────────────────────────── */
  .result-stage { text-align: center; margin-top: 22px; padding-bottom: 6px; }
  .band-label {
    font-family: var(--serif); font-style: italic;
    font-size: 28px; font-weight: 500; color: var(--gold-soft);
    line-height: 1.25;
    margin-top: 26px;
  }
  .sun-pair {
    margin-top: 12px;
    font-family: var(--jp-sans); font-size: 11.5px; letter-spacing: 0.22em;
    color: var(--cream-mute);
  }

  /* 金箔 gem divider（他画面と同一） */
  .divider {
    margin: 28px 0;
    height: 9px; display: flex; align-items: center; gap: 12px; justify-content: center;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(198,164,74,0), rgba(198,164,74,0.5), rgba(198,164,74,0));
  }
  .divider .gem {
    width: 7px; height: 7px; transform: rotate(45deg);
    background: linear-gradient(135deg, var(--gold), var(--gold-soft), var(--gold));
    box-shadow: 0 0 6px rgba(198,164,74,0.6);
  }

  .reading { margin-top: 6px; }
  .reading .body {
    font-family: var(--jp);
    font-size: 15.5px; line-height: 1.85; color: var(--cream);
    margin-top: 14px;
  }
  .reading .body p { margin-bottom: 14px; }
  .reading .body p:last-child { margin-bottom: 0; }

  /* 結果ヘッダーに veil-fill の到着感（pick→home と同言語の昇華演出） */
  .veil-fill {
    position: fixed; inset: 0; z-index: 300;
    background: radial-gradient(circle at 50% 40%, #fff7e6 0%, #f6e4b0 50%, #e9cf88 100%);
    opacity: 0; pointer-events: none; transition: opacity 0.7s ease-in;
  }
  .veil-fill.show { opacity: 1; }
  .veil-fill.hide { opacity: 0; transition: opacity 1.0s ease; }

  /* ステップ表示切替 */
  .step { display: none; }
  .step.active { display: block; animation: stepIn 0.7s cubic-bezier(0.2, 0.7, 0.3, 1); }
  @keyframes stepIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .footnote {
    margin-top: auto; padding-top: 26px; text-align: center;
    font-family: var(--jp-sans); font-size: 11px; letter-spacing: 0.05em; color: var(--cream-mute);
  }
</style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <div class="brand">
        <img src="../references/pythiel-icon.png" alt="Pythiel">
        <span class="wordmark">Pythiel</span>
      </div>
      <div class="date" id="date"></div>
      <script>
        (function(){ var d=new Date(); document.getElementById('date').textContent = d.getFullYear()+' · '+(d.getMonth()+1)+' · '+d.getDate(); })();
      </script>
    </div>

    <!-- ───────── STEP 0: 相手の入力 ───────── -->
    <section class="step active" data-step="0">
      <div class="eyebrow">
        <span class="ch">I</span><span class="label">二人の縁</span>
        <span class="pro-badge">PRO</span>
      </div>
      <div class="headline">大切な人が生まれた、<br><span class="em">その時のこと</span>を。</div>
      <div class="subline">相手の生まれた日を、そっと教えてください。</div>

      <div class="birth-block">
        <div class="date-row">
          <div class="date-field year">
            <input id="b-year" type="tel" inputmode="numeric" maxlength="4" placeholder="1995">
            <div class="unit">Year</div>
          </div>
          <div class="date-field">
            <input id="b-month" type="tel" inputmode="numeric" maxlength="2" placeholder="04">
            <div class="unit">Month</div>
          </div>
          <div class="date-field">
            <input id="b-day" type="tel" inputmode="numeric" maxlength="2" placeholder="23">
            <div class="unit">Day</div>
          </div>
        </div>

        <div class="optional-field">
          <div class="lbl">相手の呼び名 <span class="tag">任意</span></div>
          <div class="hint" style="margin-bottom:8px">結果に添えて表示します</div>
          <input class="text-input" id="b-name" type="text" placeholder="例: A さん（任意）">
        </div>

        <div class="privacy-note">
          <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
          入力した情報は端末の中だけに保存され、どこへも送られません。
        </div>
      </div>

      <button class="cta" id="reveal-cta" onclick="reveal()" disabled>縁を視る <span class="arrow">→</span></button>
    </section>

    <!-- ───────── STEP 1: 結果 ───────── -->
    <section class="step" data-step="1">
      <div class="result-stage">
        <div class="eyebrow"><span class="ch">II</span><span class="label">二人の縁</span></div>
        <div class="band-label" id="band-label">…</div>
        <div class="sun-pair" id="sun-pair">…</div>
      </div>

      <div class="divider"><span class="gem"></span></div>

      <div class="reading">
        <div class="eyebrow"><span class="ch">II</span><span class="label">二人の縁の本質</span></div>
        <div class="body" id="sec-essence">…</div>
      </div>

      <div class="divider"><span class="gem"></span></div>

      <div class="reading">
        <div class="eyebrow"><span class="ch">III</span><span class="label">いちばん活きる場面</span></div>
        <div class="body" id="sec-strength">…</div>
      </div>

      <div class="divider"><span class="gem"></span></div>

      <div class="reading">
        <div class="eyebrow"><span class="ch">IV</span><span class="label">すれ違いの形</span></div>
        <div class="body" id="sec-friction">…</div>
      </div>

      <div class="divider"><span class="gem"></span></div>

      <div class="reading">
        <div class="eyebrow"><span class="ch">V</span><span class="label">二人への助言</span></div>
        <div class="body" id="sec-advice">…</div>
      </div>

      <div class="divider"><span class="gem"></span></div>

      <div class="reading">
        <div class="eyebrow"><span class="ch">VI</span><span class="label">これから30日の兆し</span></div>
        <div class="body" id="sec-flow30">…</div>
      </div>

      <button class="ghost-cta" onclick="location.href='./home.html?picked=1'">← 今日の鑑定へ</button>
    </section>

  </div>

  <div class="veil-fill" id="veil-fill"></div>

<script src="./engine.bundle.js?v=16"></script>
<script>
  // ── 自分（本人）の生年月日: onboarding の保存を復元。無ければデフォルト ──
  function readSelfBirth() {
    // 未登録なら null（呼び出し側が登録へ誘導）。デモ誕生日 fallback は本番仕様で禁止
    try {
      var raw = null;
      try { raw = localStorage.getItem('pythiel.onboarding'); } catch (e2) {}
      if (!raw) raw = sessionStorage.getItem('pythiel.onboarding');
      if (!raw) return null;
      var s = JSON.parse(raw);
      if (!s.year || !s.month || !s.day) return null;
      var pad = function(x){ return ('0' + String(x).replace(/\D/g, '')).slice(-2); };
      var date = s.year + '-' + pad(s.month) + '-' + pad(s.day);
      var time;
      var td = (s.time || '').replace(/\D/g, '');
      if (td.length >= 3) { td = ('000' + td).slice(-4); time = td.slice(0,2) + ':' + td.slice(2,4); }
      return { date: date, time: time, name: (s.name || '').trim() || undefined };
    } catch (e) { return null; }
  }

  // ── 相手の入力バリデーション（onboarding.validBirth と同一方式） ──
  var by = document.getElementById('b-year'), bm = document.getElementById('b-month'), bd = document.getElementById('b-day');
  var bn = document.getElementById('b-name');
  var revealCta = document.getElementById('reveal-cta');
  function validBirth() {
    var y = +by.value, m = +bm.value, d = +bd.value;
    if (!(by.value.length === 4 && y >= 1900 && y <= 2025 && m >= 1 && m <= 12 && d >= 1 && d <= 31)) return false;
    // 実在日チェック（2/31 等を弾く。Date は繰り上げるので roundtrip で照合）
    var dt = new Date(y, m - 1, d);
    return dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d;
  }
  function refresh() { revealCta.disabled = !validBirth(); }
  [by, bm, bd, bn].forEach(function (el) { el.addEventListener('input', refresh); });
  // 年→月→日 オートフォーカス送り（onboarding と同一）
  by.addEventListener('input', function () { if (by.value.length === 4) bm.focus(); });
  bm.addEventListener('input', function () { if (bm.value.length === 2) bd.focus(); });

  function pad(s) { return ('0' + s).slice(-2); }

  function go(n) {
    document.querySelectorAll('.step').forEach(function (s) { s.classList.remove('active'); });
    document.querySelector('.step[data-step="' + n + '"]').classList.add('active');
    window.scrollTo(0, 0);
  }

  function renderPara(id, text) {
    var el = document.getElementById(id);
    if (!el) return;
    if (!text || !text.trim()) {
      var parent = el.closest('.reading');
      if (parent) {
        parent.style.display = 'none';
        var nextDiv = parent.nextElementSibling;
        if (nextDiv && nextDiv.classList.contains('divider')) nextDiv.style.display = 'none';
      }
      return;
    }
    var html = text.split('\n\n').map(function (p) {
      return '<p>' + p.split('\n').join('<br>') + '</p>';
    }).join('');
    el.innerHTML = html;
  }

  // ── それらしい仮の相性文（エンジン未接続時のフォールバック） ──
  function demoResult(input) {
    return {
      bandLabel: '深く響き合う縁',
      sunA: '獅子座', sunB: '牡羊座',
      sections: {
        essence: '二人は出会った瞬間から、どこか懐かしさに似た心地よさを覚える組み合わせです。互いの熱量が呼応し合い、一緒にいると自然と背筋が伸びるような、良い緊張感が生まれます。',
        strength: '新しいことに挑む場面や、目標に向かって並んで歩くときに、この組み合わせは最も輝きます。片方が引っ張り、片方が支える役割が自然と定まりやすいでしょう。',
        friction: '互いに「自分のやり方」を譲りたくない瞬間があり、そこが小さな摩擦の火種になりがちです。特に急いでいるときほど、言葉が短くなり誤解を生みやすい傾向があります。',
        advice: '意見が割れたときほど、結論を急がずに「なぜそう思うのか」を一言添える習慣を持つと、二人の縁はより長く、深く育っていきます。',
        flow30: 'これから30日は、二人の間に新しい話題や小さな挑戦が舞い込みやすい兆し。一緒に何かを始めるなら、月の後半が特に流れに乗りやすいでしょう。',
      },
    };
  }

  function reveal() {
    if (revealCta.disabled) return;

    var selfBirth = readSelfBirth();
    if (!selfBirth) { location.href = './onboarding.html'; return; }
    var otherName = bn.value.trim();
    var input = {
      a: { birthDate: selfBirth.date, birthTime: selfBirth.time, name: selfBirth.name },
      b: { birthDate: by.value + '-' + pad(bm.value) + '-' + pad(bd.value), name: otherName || undefined },
      date: (function(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); })(),
    };

    var veil = document.getElementById('veil-fill');
    veil.classList.add('show');

    setTimeout(function () {
      var E = window.PythielEngine;
      var result = null;
      try {
        if (E && typeof E.computeCompatibility === 'function') {
          var provider = new E.MoshierAstrologyProvider();
          result = E.computeCompatibility(input, provider);
        }
      } catch (e) {
        console.error('computeCompatibility failed', e);
      }
      // 計算できないときはダミー鑑定を見せず、正直に伝えて戻す（本番仕様 2026-07-18）
      if (!result) {
        veil.classList.remove('show');
        alert('鑑定を計算できませんでした。入力を確認してもう一度お試しください。');
        return;
      }

      var bandLabelEl = document.getElementById('band-label');
      bandLabelEl.textContent = result.bandLabel || result.band || '深く響き合う縁';

      var sunPairEl = document.getElementById('sun-pair');
      if (result.sunA && result.sunB) {
        // 呼び名（任意）を消費: 入れてくれた人には「誰との縁か」を結果に刻む
        sunPairEl.textContent = otherName
          ? otherName + ' との縁 — ' + result.sunA + ' × ' + result.sunB
          : result.sunA + ' × ' + result.sunB;
      } else {
        sunPairEl.style.display = 'none';
      }

      var sections = result.sections || {};
      renderPara('sec-essence', sections.essence);
      renderPara('sec-strength', sections.strength);
      renderPara('sec-friction', sections.friction);
      renderPara('sec-advice', sections.advice);
      renderPara('sec-flow30', sections.flow30);

      go(1);
      requestAnimationFrame(function () {
        veil.classList.add('hide');
        setTimeout(function () { veil.classList.remove('show', 'hide'); }, 1000);
      });
    }, 500);
  }
</script>
</body>
</html>
